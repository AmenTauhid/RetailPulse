name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: retailpulse
          POSTGRES_PASSWORD: retailpulse
          POSTGRES_DB: retailpulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U retailpulse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - name: Install dependencies
        run: |
          pip install -r data/scripts/requirements.txt \
                      -r api/requirements.txt \
                      -r ml/requirements.txt \
                      anthropic \
                      pytest pytest-asyncio pyyaml
      - name: Seed database
        env:
          DATABASE_URL_SYNC: postgresql://retailpulse:retailpulse@localhost:5432/retailpulse
          DATABASE_URL: postgresql+asyncpg://retailpulse:retailpulse@localhost:5432/retailpulse
        run: PYTHONPATH=. python -m etl.pipelines.seed
      - name: Train model
        env:
          DATABASE_URL_SYNC: postgresql://retailpulse:retailpulse@localhost:5432/retailpulse
          DATABASE_URL: postgresql+asyncpg://retailpulse:retailpulse@localhost:5432/retailpulse
        run: PYTHONPATH=. python -m ml.models.train
      - name: Run tests
        env:
          DATABASE_URL_SYNC: postgresql://retailpulse:retailpulse@localhost:5432/retailpulse
          DATABASE_URL: postgresql+asyncpg://retailpulse:retailpulse@localhost:5432/retailpulse
        run: PYTHONPATH=. python -m pytest etl/tests/ ml/tests/ api/tests/ -v

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Type check
        working-directory: web
        run: npx tsc --noEmit
      - name: Build
        working-directory: web
        run: npm run build
